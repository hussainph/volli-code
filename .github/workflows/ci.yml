name: CI

on:
  pull_request:
  push:
    branches:
      - main

# Cancel superseded runs for the same ref (a new push to a branch/PR aborts the
# in-flight run rather than queueing behind it).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          run-install: true

      - name: Check
        run: vp check

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build desktop pipeline
        run: vp run --filter @volli/desktop build

      - name: Verify build artifacts
        run: |
          test -f apps/desktop/dist-electron/main.cjs
          test -f apps/desktop/dist-electron/preload.cjs
          test -f apps/desktop/dist/index.html

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          run-install: true

      - name: Test
        run: vp run -r test
