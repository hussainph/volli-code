name: CI

# Minutes-rationed CI (private repo, free-tier Actions pool).
#
# macOS runners bill at a 10x multiplier, so the desktop smoke lane alone was
# ~40 billed minutes per run — ~85% of the old pipeline's cost — and it fired
# on every PR push AND again on every merge to main. The full application smoke
# suite runs locally for free (apps/desktop/e2e/*.mjs on the dev Mac), so CI
# keeps only the cheap cross-check: one Linux job on PRs.
#
# Deliberately removed (run them locally or on demand instead):
#   - push-to-main lane: PRs gate every merge; a duplicate post-merge run
#     doubled the bill for no new signal.
#   - weekly cron + extended macOS smokes: silent background burn.
#   - advisory coverage reports: re-ran the whole test suite twice per run.
#   - dependency-audit job: Dependabot already opens update PRs; `vp pm audit`
#     works locally.
#   - macOS desktop smoke on PRs: now manual-only via workflow_dispatch below
#     (`gh workflow run ci.yml -f desktop-smoke=true`). One invocation bills
#     ~40 minutes — save it for release-candidate checks.

on:
  pull_request:
  workflow_dispatch:
    inputs:
      desktop-smoke:
        description: "Also run the macOS desktop smoke lane (bills ~40 min)"
        type: boolean
        default: false

permissions:
  contents: read

# Agents push frequently; cancel superseded runs for the same PR so only the
# latest head ever finishes.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core:
    name: Check + Test
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1
        with:
          node-version-file: package.json
          cache: true
          run-install: true

      - name: Check
        run: vp check

      # Two invocations: `vp run -r` covers workspace packages only — the root
      # vite.config.ts (quality-stack config) needs its own tsc pass.
      - name: Typecheck
        run: |
          vp exec tsc --noEmit -p tsconfig.json
          vp run -r typecheck

      - name: Build desktop pipeline
        run: vp run --filter @volli/desktop build

      - name: Verify build artifacts
        run: |
          test -f apps/desktop/dist-electron/main.cjs
          test -f apps/desktop/dist-electron/preload.cjs
          test -f apps/desktop/dist/index.html

      # The identical suite plus the 100%-threshold gate over the protected
      # logic layer. This remains the hard regression gate.
      - name: Test protected coverage surface
        run: vp run -r test:coverage

  # Manual-only macOS lane (10x billing multiplier — ~40 minutes per run).
  # Trigger deliberately: gh workflow run ci.yml -f desktop-smoke=true
  desktop-smoke:
    name: Desktop smoke (manual)
    if: github.event_name == 'workflow_dispatch' && inputs.desktop-smoke
    runs-on: macos-15
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1
        with:
          node-version-file: package.json
          cache: true
          run-install: true

      - name: Build and fetch Electron
        run: |
          vp run --filter @volli/desktop build
          vp run --filter @volli/desktop ensure:electron

      - name: Run stable application smokes
        shell: bash
        run: |
          failures=0
          smokes=(
            board-smoke.mjs
            ticket-detail-smoke.mjs
            global-artifacts-smoke.mjs
            composer-basics-smoke.mjs
            composer-draft-smoke.mjs
            composer-kickoff-smoke.mjs
            agent-socket-smoke.mjs
            agent-cli-roundtrip-smoke.mjs
            agent-cli-token-bench.mjs
            agent-pty-env-smoke.mjs
            agent-installer-smoke.mjs
            agent-consent-smoke.mjs
            agent-board-live-move-smoke.mjs
          )

          for smoke in "${smokes[@]}"; do
            echo "::group::$smoke"
            node "apps/desktop/e2e/$smoke" || failures=$((failures + 1))
            echo "::endgroup::"
          done

          if (( failures > 0 )); then
            echo "$failures desktop smoke suite(s) failed" >&2
            exit 1
          fi
