version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:17"
      timezone: Asia/Kuwait
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:47"
      timezone: Asia/Kuwait
    open-pull-requests-limit: 10
    groups:
      non-major-dependencies:
        update-types:
          - minor
          - patch
