version: 2

# Monthly cadence: every Dependabot PR triggers a CI run against the paid
# Actions minutes pool, so batch updates instead of weekly drips.
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      time: "04:17"
      timezone: Asia/Kuwait
    open-pull-requests-limit: 2

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
      time: "04:47"
      timezone: Asia/Kuwait
    open-pull-requests-limit: 3
    groups:
      non-major-dependencies:
        update-types:
          - minor
          - patch
