version: 2

# Monthly cadence: every Dependabot PR triggers a CI run against the paid
# Actions minutes pool, so batch updates instead of weekly drips.
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      time: "04:17"
      timezone: Asia/Kuwait
    open-pull-requests-limit: 2

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
      time: "04:47"
      timezone: Asia/Kuwait
    open-pull-requests-limit: 3
    groups:
      non-major-dependencies:
        update-types:
          - minor
          - patch
    ignore:
      # apps/website deliberately pins typescript to 6.x (a literal version,
      # not `catalog:`): `astro check` — via @astrojs/language-server — needs
      # TypeScript's programmatic compiler API that TS 7.0+ dropped, so a major
      # bump silently breaks the site build/deploy while the lean CI (desktop
      # build + raw `tsc`) stays green. Revisit when astro ships TS7 support:
      # https://github.com/withastro/roadmap/discussions/1321
      - dependency-name: "typescript"
        update-types:
          - "version-update:semver-major"
