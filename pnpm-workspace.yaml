packages:
  - apps/*
  - packages/*

# Successor to onlyBuiltDependencies (pnpm 11): true = allowed to run build scripts.
# electron@43 ships no lifecycle scripts (its binary comes from a require-time
# fetch), but pnpm 11 still hard-fails install (ERR_PNPM_IGNORED_BUILDS) without
# this entry — do not remove it.
allowBuilds:
  better-sqlite3: true
  electron: true
  esbuild: true
  # Native addons are initially compiled against the system Node ABI. The
  # desktop package's postinstall rebuilds them for Electron's ABI.
  node-pty: true
  sharp: true
  workerd: true

catalog:
  "@types/node": ^26.1.1
  "@types/react": ^19.2.17
  "@types/react-dom": ^19.2.3
  typescript: ~7.0.2
  vite: npm:@voidzero-dev/vite-plus-core@0.2.5
  vite-plus: 0.2.5
  # Must match the vitest bundled in vite-plus (vp fails fast on version
  # skew) — bump in lockstep with the vite-plus pin above.
  "@vitest/coverage-v8": 4.1.10

minimumReleaseAgeExclude:
  - "@voidzero-dev/vite-plus-core@0.2.5"
  - "@voidzero-dev/vite-plus-darwin-arm64@0.2.5"
  - "@voidzero-dev/vite-plus-darwin-x64@0.2.5"
  - "@voidzero-dev/vite-plus-linux-arm64-gnu@0.2.5"
  - "@voidzero-dev/vite-plus-linux-arm64-musl@0.2.5"
  - "@voidzero-dev/vite-plus-linux-x64-gnu@0.2.5"
  - "@voidzero-dev/vite-plus-linux-x64-musl@0.2.5"
  - "@voidzero-dev/vite-plus-win32-arm64-msvc@0.2.5"
  - "@voidzero-dev/vite-plus-win32-x64-msvc@0.2.5"
  - vite-plus@0.2.5
  - "@typescript/typescript-aix-ppc64@7.0.2"
  - "@typescript/typescript-darwin-arm64@7.0.2"
  - "@typescript/typescript-darwin-x64@7.0.2"
  - "@typescript/typescript-freebsd-arm64@7.0.2"
  - "@typescript/typescript-freebsd-x64@7.0.2"
  - "@typescript/typescript-linux-arm64@7.0.2"
  - "@typescript/typescript-linux-arm@7.0.2"
  - "@typescript/typescript-linux-loong64@7.0.2"
  - "@typescript/typescript-linux-mips64el@7.0.2"
  - "@typescript/typescript-linux-ppc64@7.0.2"
  - "@typescript/typescript-linux-riscv64@7.0.2"
  - "@typescript/typescript-linux-s390x@7.0.2"
  - "@typescript/typescript-linux-x64@7.0.2"
  - "@typescript/typescript-netbsd-arm64@7.0.2"
  - "@typescript/typescript-netbsd-x64@7.0.2"
  - "@typescript/typescript-openbsd-arm64@7.0.2"
  - "@typescript/typescript-openbsd-x64@7.0.2"
  - "@typescript/typescript-sunos-x64@7.0.2"
  - "@typescript/typescript-win32-arm64@7.0.2"
  - "@typescript/typescript-win32-x64@7.0.2"
  - typescript@7.0.2
  - astro@7.1.1
  - miniflare@4.20260714.0
  - wrangler@4.112.0

overrides:
  vite: "catalog:"

packageExtensions:
  vite-plus@*:
    dependencies:
      vite: "catalog:"

patchedDependencies:
  restty@0.2.0: patches/restty@0.2.0.patch

peerDependencyRules:
  allowAny:
    - vite
